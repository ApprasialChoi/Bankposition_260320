<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>은행 지점 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; font-family: 'Pretendard', -apple-system, sans-serif; overflow: hidden; }

        /* ===== 지도 영역 ===== */
        #map, #kakao-map {
            position: absolute; top: 0; right: 0; bottom: 0;
            left: 320px; width: calc(100% - 320px);
        }
        #kakao-map { z-index: 0; }
        #map { z-index: 1; background: transparent; }

        /* ===== 사이드 패널 ===== */
        #side-panel {
            position: fixed; top: 0; left: 0; width: 320px; height: 100%;
            background: #fff; z-index: 3000; display: flex; flex-direction: column;
            box-shadow: 2px 0 12px rgba(0,0,0,0.08);
        }
        .panel-header { padding: 18px 20px; background: linear-gradient(135deg, #1a365d, #2b6cb0); color: white; }
        .panel-header h1 { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
        .panel-header .subtitle { font-size: 11px; opacity: 0.85; }
        .panel-count { font-size: 13px; margin-top: 8px; font-weight: 600; }
        .panel-count span { color: #fbd38d; }
        .sync-status { font-size: 10px; margin-top: 4px; opacity: 0.85; }
        .sync-status.ok { color: #9ae6b4; }
        .sync-status.err { color: #feb2b2; }
        .sync-status.pending { color: #fbd38d; }

        .filter-section { padding: 12px 16px; border-bottom: 1px solid #edf2f7; }
        .filter-section label { font-size: 11px; font-weight: 600; color: #718096; display: block; margin-bottom: 6px; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 4px; }
        .chip {
            padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
            cursor: pointer; border: 1.5px solid #e2e8f0; background: white;
            transition: all 0.15s; user-select: none;
        }
        .chip.active { color: white; border-color: transparent; }
        .chip:hover { transform: scale(1.04); }
        .search-input {
            width: 100%; padding: 8px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
            font-size: 12px; outline: none; margin-top: 8px; font-family: inherit;
        }
        .search-input:focus { border-color: #2b6cb0; }

        /* IBK 섹션 강조 */
        .ibk-section {
            background: linear-gradient(180deg, #fafbff, #fff);
            border-left: 3px solid #0051af;
            padding: 12px 16px;
            border-bottom: 1px solid #edf2f7;
        }
        .ibk-section .ibk-title {
            font-size: 11px; font-weight: 700; color: #0051af;
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
        }
        .ibk-section label { font-size: 10px; font-weight: 600; color: #718096; display: block; margin-bottom: 4px; margin-top: 8px; }
        .ibk-section label:first-of-type { margin-top: 0; }

        #list-container { flex: 1; overflow-y: auto; }
        .list-item { padding: 11px 16px; border-bottom: 1px solid #f7fafc; cursor: pointer; transition: background 0.15s; }
        .list-item:hover { background: #f0f7ff; }
        .list-item .bank-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; color: white; margin-bottom: 4px; }
        .list-item .name { font-size: 14px; font-weight: 700; color: #2d3748; }
        .list-item .meta { font-size: 11px; color: #718096; margin-top: 3px; }
        .list-item .ibk-info { font-size: 11px; color: #0051af; margin-top: 2px; font-weight: 600; }
        .list-item .note-preview { font-size: 11px; color: #d97706; margin-top: 3px; padding: 2px 6px; background: #fef3c7; border-radius: 3px; display: inline-block; }
        .empty-state { padding: 40px 20px; text-align: center; color: #a0aec0; font-size: 13px; }

        /* ===== 자료실 — 우측 상단 플로팅 패널 ===== */
        #docs-floating {
            position: absolute;
            top: 70px; right: 10px;
            width: 280px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.18);
            z-index: 1000;
            display: none;
            overflow: hidden;
        }
        #docs-floating.visible { display: block; }
        #docs-floating .docs-header {
            padding: 10px 14px;
            background: linear-gradient(135deg, #1a365d, #2b6cb0);
            color: white;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; font-weight: 700;
        }
        #docs-floating .docs-header .docs-close {
            background: transparent; border: none; color: white;
            font-size: 18px; cursor: pointer; padding: 0 6px; line-height: 1;
        }
        #docs-floating .docs-body { padding: 8px 6px 12px; max-height: 480px; overflow-y: auto; }

        .docs-tree { list-style: none; padding: 0; margin: 0; font-size: 13px; }
        .docs-tree .docs-folder, .docs-tree .docs-file {
            padding: 7px 10px; cursor: pointer; user-select: none;
            border-radius: 6px; display: flex; align-items: center; gap: 6px;
            color: #2d3748; transition: background 0.15s;
        }
        .docs-tree .docs-folder:hover, .docs-tree .docs-file:hover {
            background: #f0f7ff;
        }
        .docs-tree .docs-folder { font-weight: 700; }
        .docs-tree .docs-folder .arrow {
            font-size: 10px; color: #a0aec0; transition: transform 0.2s;
            display: inline-block; width: 10px;
        }
        .docs-tree .docs-folder.open .arrow { transform: rotate(90deg); }
        .docs-tree .docs-children {
            list-style: none; padding-left: 22px; margin: 2px 0; display: none;
        }
        .docs-tree .docs-folder.open + .docs-children { display: block; }
        .docs-tree .docs-file {
            color: #4a5568; padding: 6px 10px;
        }
        .docs-tree .docs-file::before { content: '📄'; flex-shrink: 0; }
        .docs-tree .docs-file .file-name { flex: 1; }
        .docs-tree .docs-file:hover { color: #0051af; }

        /* 모바일에서는 화면 거의 전체 차지 */
        @media (max-width: 768px) {
            #docs-floating {
                top: 60px; right: 10px; left: 10px;
                width: auto; max-width: none;
            }
            #docs-floating .docs-body { max-height: 60vh; }
        }

        /* ===== 팀 캘린더 — 우측 상단 플로팅 패널 ===== */
        #cal-floating {
            position: absolute;
            top: 70px;          /* 라벨 토글 컨트롤 아래 */
            right: 10px;
            width: 320px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.18);
            z-index: 1000;
            display: none;
            overflow: hidden;
        }
        #cal-floating.visible { display: block; }
        #cal-floating .cal-header {
            padding: 10px 14px;
            background: linear-gradient(135deg, #1a365d, #2b6cb0);
            color: white;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; font-weight: 700;
        }
        #cal-floating .cal-header .cal-close {
            background: transparent; border: none; color: white;
            font-size: 18px; cursor: pointer; padding: 0 6px; line-height: 1;
        }
        #cal-floating .cal-body { padding: 12px; max-height: 480px; overflow-y: auto; }
        .cal-nav {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px; font-size: 13px; font-weight: 700; color: #2d3748;
        }
        .cal-nav button {
            border: 1px solid #cbd5e0; background: white; cursor: pointer;
            border-radius: 6px; padding: 3px 10px; font-size: 14px; color: #4a5568;
        }
        .cal-nav button:hover { background: #f0f7ff; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .cal-grid .dow {
            text-align: center; font-size: 10px; font-weight: 700;
            color: #a0aec0; padding: 4px 0;
        }
        .cal-grid .dow.sun { color: #e53e3e; }
        .cal-grid .dow.sat { color: #2b6cb0; }
        .cal-day {
            aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: flex-start; padding-top: 2px; font-size: 11px; cursor: pointer;
            border-radius: 4px; position: relative; color: #2d3748;
            transition: background 0.15s;
        }
        .cal-day:hover { background: #e6f0ff; }
        .cal-day.other { color: #cbd5e0; }
        .cal-day.today { font-weight: 800; color: #2b6cb0; }
        .cal-day.today::before {
            content: ''; position: absolute; inset: 1px;
            border: 1.5px solid #2b6cb0; border-radius: 4px; pointer-events: none;
        }
        .cal-day.selected { background: #2b6cb0; color: white !important; font-weight: 700; }
        .cal-day.selected::before { border-color: transparent; }
        .cal-day.sun { color: #e53e3e; }
        .cal-day.sat { color: #2b6cb0; }
        .cal-day .dots {
            display: flex; gap: 2px; margin-top: 1px; flex-wrap: wrap; justify-content: center;
            max-width: 100%; line-height: 1;
        }
        .cal-day .dots .dot {
            width: 4px; height: 4px; border-radius: 50%; display: inline-block;
        }
        .cal-day.selected .dots .dot { background: white !important; }
        .cal-events { margin-top: 10px; padding-top: 10px; border-top: 1px solid #edf2f7; }
        .cal-events h4 {
            font-size: 11px; font-weight: 700; color: #4a5568; margin-bottom: 6px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .cal-events h4 .add-btn {
            background: #0051af; color: white; border: none; border-radius: 4px;
            padding: 2px 8px; font-size: 11px; font-weight: 700; cursor: pointer;
        }
        .cal-events h4 .add-btn:hover { background: #003D7A; }
        .cal-event-item {
            display: flex; align-items: flex-start; gap: 6px;
            padding: 6px 8px; margin-bottom: 4px;
            background: white; border: 1px solid #edf2f7; border-radius: 6px;
            cursor: pointer; transition: background 0.15s;
        }
        .cal-event-item:hover { background: #f0f7ff; }
        .cal-event-item .ev-color {
            width: 4px; flex-shrink: 0; align-self: stretch; border-radius: 2px;
            margin-top: 2px; margin-bottom: 2px;
        }
        .cal-event-item .ev-content { flex: 1; min-width: 0; }
        .cal-event-item .ev-time { font-size: 10px; color: #718096; font-weight: 600; }
        .cal-event-item .ev-title { font-size: 12px; font-weight: 700; color: #2d3748; word-break: break-word; }
        .cal-event-item .ev-meta { font-size: 10px; color: #718096; margin-top: 1px; word-break: break-word; }
        .cal-events-empty {
            text-align: center; color: #a0aec0; font-size: 11px; padding: 12px;
            font-style: italic;
        }

        /* 모바일에서는 화면 거의 전체 차지 */
        @media (max-width: 768px) {
            #cal-floating {
                top: 60px;
                right: 10px;
                left: 10px;
                width: auto;
                max-width: none;
            }
            #cal-floating .cal-body { max-height: 60vh; }
        }

        /* ===== 일정 모달 ===== */
        .cal-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 5000;
            align-items: center; justify-content: center;
        }
        .cal-modal-overlay.visible { display: flex; }
        .cal-modal {
            background: white; border-radius: 12px; padding: 20px;
            width: 90%; max-width: 380px; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .cal-modal h3 {
            font-size: 16px; font-weight: 700; color: #1a202c;
            margin-bottom: 14px;
        }
        .cal-modal .field { margin-bottom: 10px; }
        .cal-modal label {
            display: block; font-size: 11px; font-weight: 600;
            color: #718096; margin-bottom: 4px;
        }
        .cal-modal input[type="text"],
        .cal-modal input[type="date"],
        .cal-modal input[type="time"],
        .cal-modal select,
        .cal-modal textarea {
            width: 100%; padding: 7px 10px; border: 1.5px solid #e2e8f0;
            border-radius: 6px; font-size: 13px; outline: none; font-family: inherit;
        }
        .cal-modal input:focus, .cal-modal select:focus, .cal-modal textarea:focus { border-color: #0051af; }
        .cal-modal textarea { resize: vertical; min-height: 60px; }
        .cal-modal .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .cal-modal .checkbox-row { display: flex; align-items: center; gap: 6px; font-size: 12px; }
        .cal-modal .checkbox-row input { width: 16px; height: 16px; }
        .cal-modal-actions {
            display: flex; gap: 8px; margin-top: 14px; padding-top: 12px;
            border-top: 1px solid #edf2f7;
        }
        .cal-modal-actions button {
            flex: 1; padding: 8px; border: none; border-radius: 6px;
            font-size: 13px; font-weight: 700; cursor: pointer;
        }
        .cal-modal-actions .btn-save { background: #0051af; color: white; }
        .cal-modal-actions .btn-save:hover { background: #003D7A; }
        .cal-modal-actions .btn-save:disabled { background: #cbd5e0; cursor: not-allowed; }
        .cal-modal-actions .btn-delete { background: #fee2e2; color: #dc2626; }
        .cal-modal-actions .btn-delete:hover { background: #fecaca; }
        .cal-modal-actions .btn-cancel { background: #edf2f7; color: #4a5568; }
        .cal-modal-actions .btn-cancel:hover { background: #e2e8f0; }

        /* ===== 팝업 (공통) ===== */
        .leaflet-popup-content-wrapper {
            border-radius: 10px !important; border: none !important;
            box-shadow: 0 6px 24px rgba(0,0,0,0.15) !important;
        }
        .leaflet-popup-content { margin: 0 !important; width: 280px !important; }
        .popup-inner { padding: 14px 16px; }
        .popup-inner .bank-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; color: white; margin-bottom: 6px; }
        .popup-inner .branch-name { font-size: 16px; font-weight: 800; color: #1a202c; margin-bottom: 8px; }
        .popup-inner .info-row { font-size: 12px; color: #4a5568; margin-bottom: 4px; }
        .popup-inner .info-row b { color: #2d3748; min-width: 60px; display: inline-block; font-weight: 600; }

        /* IBK 풀 팝업 전용 */
        .leaflet-popup-content.ibk-popup-wrap { width: 320px !important; }
        .popup-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid #edf2f7; }
        .popup-section h3 {
            font-size: 11px; font-weight: 700; color: #0051af;
            margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .history-table { width: 100%; font-size: 11px; border-collapse: collapse; margin-top: 4px; }
        .history-table th, .history-table td { padding: 4px 5px; border-bottom: 1px solid #edf2f7; text-align: left; vertical-align: middle; }
        .history-table th { background: #f7fafc; color: #718096; font-weight: 600; font-size: 10px; }
        .history-table td.col-note { padding: 2px 4px; }
        .history-table .row-note-input {
            width: 100%; padding: 3px 6px; border: 1px solid transparent; border-radius: 4px;
            font-size: 11px; outline: none; font-family: inherit; background: transparent;
            transition: border-color 0.15s, background 0.15s;
        }
        .history-table .row-note-input:hover { border-color: #cbd5e0; background: #fafbff; }
        .history-table .row-note-input:focus { border-color: #0051af; background: #fff; }
        .history-table .row-note-input.saving { background: #fffbeb; border-color: #f59e0b; }
        .history-table .row-note-input.saved { background: #d1fae5; border-color: #10b981; }
        .history-table .row-note-input.err { background: #fee2e2; border-color: #ef4444; }
        .history-empty { font-size: 11px; color: #a0aec0; font-style: italic; }
        .history-hint { font-size: 10px; color: #a0aec0; margin-top: 4px; font-style: italic; }

        .note-edit { display: flex; gap: 6px; margin-top: 4px; }
        .note-edit textarea {
            flex: 1; padding: 6px 8px; border: 1.5px solid #e2e8f0; border-radius: 6px;
            font-size: 12px; outline: none; font-family: inherit; resize: vertical;
            min-height: 32px; max-height: 80px;
        }
        .note-edit textarea:focus { border-color: #0051af; }
        .note-edit .save-btn {
            padding: 4px 10px; background: #0051af; color: white; border: none;
            border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer;
            flex-shrink: 0; align-self: flex-start; transition: background 0.15s;
        }
        .note-edit .save-btn:hover { background: #003D7A; }
        .note-edit .save-btn:disabled { background: #cbd5e0; cursor: not-allowed; }
        .note-edit .save-btn.saved { background: #38a169; }
        .visit-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 12px; }
        .visit-row b { color: #2d3748; font-weight: 600; min-width: 60px; }
        .visit-row input[type="date"] {
            padding: 4px 6px; border: 1.5px solid #e2e8f0; border-radius: 6px;
            font-size: 11px; outline: none; font-family: inherit;
        }
        .visit-row input[type="date"]:focus { border-color: #0051af; }

        /* ===== 라벨 ===== */
        .leaflet-tooltip.bank-label {
            background: transparent !important; border: none !important;
            box-shadow: none !important; padding: 0 !important;
        }
        .leaflet-tooltip-top.bank-label:before { display: none !important; }
        .label-box {
            background: #fff;
            border: 2px solid #3388ff;
            border-radius: 5px;
            padding: var(--label-padding, 3px 7px);
            text-align: center;
            white-space: nowrap;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
            transform: scale(var(--label-scale, 1));
            transform-origin: center bottom;
            transition: transform 0.15s ease;
            min-width: var(--label-min-width, 60px);
            max-width: var(--label-max-width, 180px);
        }
        .label-box .lbl-name {
            font-weight: 700;
            color: #1a202c;
            font-size: var(--label-font-main, 11px);
        }
        .label-box .lbl-bank {
            font-size: var(--label-font-sub, 9px);
            color: #fff;
            padding: 1px 5px;
            border-radius: 3px;
            display: inline-block;
            margin-top: 2px;
        }
        .label-box .lbl-visit-done {
            font-size: 8px; font-weight: 700; color: #059669; background: #d1fae5;
            padding: 0 4px; border-radius: 2px; border: 1px solid #34d399;
            display: inline-block; margin-top: 2px; margin-left: 3px;
        }
        .labels-hidden .bank-label { display: none !important; }

        /* 컨트롤 */
        .label-toggle-ctrl {
            background: rgba(255,255,255,0.96); padding: 6px 8px; border-radius: 6px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.2); font: 11px sans-serif;
        }
        .label-toggle-ctrl button {
            font-size: 10px; padding: 3px 8px; cursor: pointer; border: 1px solid #ddd;
            border-radius: 4px; background: #fff; margin-right: 3px;
        }
        .label-toggle-ctrl button:hover { background: #f0f7ff; }

        /* 모바일 */
        #mobile-toggle {
            display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 4000; background: linear-gradient(135deg, #1a365d, #2b6cb0); color: white;
            border: none; border-radius: 30px; padding: 11px 22px; font-size: 13px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 14px rgba(26,54,93,0.4);
        }
        .drawer-handle { display: none; width: 40px; height: 4px; background: #cbd5e0; border-radius: 2px; margin: 8px auto 4px; }
        #panel-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 2999; }

        @media (max-width: 768px) {
            #map, #kakao-map { left: 0; width: 100%; }
            #side-panel {
                position: fixed; top: auto; left: 0; right: 0; bottom: 0;
                width: 100%; height: 60vh; border-radius: 14px 14px 0 0;
                box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
                transform: translateY(100%); transition: transform 0.3s ease;
            }
            #side-panel.open { transform: translateY(0); }
            .drawer-handle { display: block; }
            .panel-header { padding: 6px 16px 12px; border-radius: 14px 14px 0 0; }
            #mobile-toggle { display: block; }
            #side-panel.open ~ #mobile-toggle { display: none; }
            #side-panel.open ~ #panel-overlay { display: block; }
            .leaflet-popup-content { width: 250px !important; }
            .leaflet-popup-content.ibk-popup-wrap { width: 280px !important; }
        }
    </style>
</head>
<body>
    <div id="side-panel">
        <div class="drawer-handle"></div>
        <div class="panel-header">
            <h1>🏦 은행 지점 지도</h1>
            <div class="subtitle">서울 · 인천 · 경기 은행 지점 현황</div>
            <div class="panel-count">표시 중: <span id="visible-count">0</span>건</div>
            <div class="sync-status pending" id="sync-status">⏳ IBK 서버 연결 중…</div>
        </div>

        <div class="filter-section">
            <label>은행 필터 (클릭으로 ON/OFF)</label>
            <div class="filter-row" id="bank-filters"></div>
            <input type="text" class="search-input" id="search-input" placeholder="점포명 / 주소 검색">
        </div>

        <!-- IBK 전용 필터 섹션 -->
        <div class="ibk-section">
            <div class="ibk-title">🏦 IBK기업은행 전용 필터</div>
            <label>지역본부</label>
            <div class="filter-row" id="ibk-region-filters"></div>

    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=231190ac1aca72ada0b739110d8a0eb4"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/kakao_base.js"></script>
    <script src="data/bank_1st.js"></script>
    <script src="data/bank_2nd.js"></script>
    <script src="data/branches.js"></script>
    <script>
    // ============================================================
    // 설정 (IBK 전용 Apps Script)
    // ============================================================
    var API_URL = 'https://script.google.com/macros/s/AKfycbwhXSrlElhN59TrRtxCEDuVUx0snWPMPyrdCH7j3yYUNLCAlcWY8m6lu1hJIRrPZ1l0/exec';
    var API_TOKEN = 'IBK15520!';

    function setSync(state, msg){
        var el = document.getElementById('sync-status');
        if(!el) return;
        el.className = 'sync-status ' + state;
        el.textContent = msg;
    }

    function apiLoad(){
        var url = API_URL + '?token=' + encodeURIComponent(API_TOKEN) + '&action=load';
        return fetch(url).then(function(r){
            if(!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        });
    }
    function apiSave(payload){
        payload.token = API_TOKEN;
        setSync('pending', '💾 저장 중…');
        return fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
        }).then(function(r){
            if(!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        }).then(function(res){
            if(!res.ok) throw new Error(res.error || '저장 실패');
            setSync('ok', '✓ IBK 동기화 완료 ' + new Date().toLocaleTimeString('ko-KR'));
            return res;
        }).catch(function(err){
            console.error(err);
            setSync('err', '⚠ 저장 실패: ' + err.message);
            throw err;
        });
    }

    // ============================================================
    // 은행 색상
    // ============================================================
    var BANK_COLORS = {
        'IBK기업은행':'#0051af', 'NH농협은행':'#00a651', '신한은행':'#0046ff',
        'iM뱅크(구 대구은행)':'#aa1f2e', 'BNK부산은행':'#e31837', '광주은행':'#d4a017',
        'BNK경남은행':'#f26522', 'KB국민은행':'#ffb300', '하나은행':'#009688',
        '새마을금고':'#6a1b9a', 'Sh수협은행':'#0277bd'
    };
    function getBankColor(n){ return BANK_COLORS[n] || '#888'; }

    // ============================================================
    // IBK 데이터 (branches.js의 IBK_BRANCHES)
    // ============================================================
    var ibkData = (typeof IBK_BRANCHES !== 'undefined') ? IBK_BRANCHES : [];
    var ibkByName = {};
    ibkData.forEach(function(b){ ibkByName[b.name] = b; });

    // ============================================================
    // 지도 초기화
    // ============================================================
    var map = L.map('map', {
        zoomControl: true, maxZoom: 19, minZoom: 7, attributionControl: false
    }).setView([37.5, 127.0], 10);
    initKakaoBaseMap(map, { mapTypeId: 'ROADMAP' });

    // 줌별 라벨 크기
    var labelScaleConfig = [
        {maxZoom:10, scale:0.55, fontMain:'9px', fontSub:'7px', padding:'2px 5px', minW:'45px', maxW:'110px'},
        {maxZoom:12, scale:0.7, fontMain:'10px', fontSub:'8px', padding:'3px 6px', minW:'55px', maxW:'140px'},
        {maxZoom:14, scale:0.85, fontMain:'10px', fontSub:'8px', padding:'3px 7px', minW:'60px', maxW:'160px'},
        {maxZoom:16, scale:1.0, fontMain:'11px', fontSub:'9px', padding:'4px 8px', minW:'70px', maxW:'180px'},
        {maxZoom:99, scale:1.1, fontMain:'12px', fontSub:'9px', padding:'5px 9px', minW:'75px', maxW:'200px'}
    ];
    function updateLabelScale(){
        var z = map.getZoom();
        var cfg = labelScaleConfig[labelScaleConfig.length-1];
        for(var i = 0; i < labelScaleConfig.length; i++){
            if(z <= labelScaleConfig[i].maxZoom){ cfg = labelScaleConfig[i]; break; }
        }
        var r = document.documentElement;
        r.style.setProperty('--label-scale', cfg.scale);
        r.style.setProperty('--label-font-main', cfg.fontMain);
        r.style.setProperty('--label-font-sub', cfg.fontSub);
        r.style.setProperty('--label-padding', cfg.padding);
        r.style.setProperty('--label-min-width', cfg.minW);
        r.style.setProperty('--label-max-width', cfg.maxW);
    }
    map.on('zoomend', updateLabelScale);
    updateLabelScale();

    // ============================================================
    // 라벨 빌더 (1·2차용 단순 라벨)
    // ============================================================
    function buildLabel(bankName, branchName){
        var c = getBankColor(bankName);
        return '<div class="label-box" style="border-color:' + c + ';">' +
            '<div class="lbl-name">' + escHtml(branchName) + '</div>' +
            '<span class="lbl-bank" style="background:' + c + ';">' + escHtml(bankName) + '</span>' +
        '</div>';
    }

    // ============================================================
    // 1·2차 마커 생성 (단순)
    // ============================================================
    var allMarkers = [];

    function createBankMarkers(geojson, sourceLabel){
        L.geoJson(geojson, {
            pointToLayer: function(f, ll){
                var p = f.properties;
                var bankName = p['은행명'] || '';
                var branchName = p['점포명'] || '';
                var c = getBankColor(bankName);

                var m = L.circleMarker(ll, {
                    radius: 6, fillColor: c, color: '#fff',
                    weight: 1.5, fillOpacity: 0.85
                });
                m._bankName = bankName;
                m._branchName = branchName;
                m._source = sourceLabel;  // '1st', '2nd'
                m._props = p;
                m._isIBK = false;

                m.bindTooltip(buildLabel(bankName, branchName), {
                    permanent: true, direction: 'top',
                    className: 'bank-label', offset: [0, -10]
                });

                m.on('click', function(){
                    openSimpleBankPopup(m);
                });

                allMarkers.push(m);
                return m;
            }
        }).addTo(map);
    }

    // ============================================================
    // IBK 마커 생성 (별도)
    // ============================================================
    var ibkMarkers = {};
    function createIbkMarkers(){
        ibkData.forEach(function(b){
            if(!b.lat || !b.lng) return;
            var c = ibkMarkerColor(b);  // 방문여부에 따라 색 결정

            var m = L.circleMarker([b.lat, b.lng], {
                radius: 6, fillColor: c, color: '#fff',
                weight: 1.5, fillOpacity: 0.85
            });
            m._bankName = 'IBK기업은행';
            m._branchName = b.name;
            m._source = 'ibk';
            m._isIBK = true;
            m._ibkData = b;

            m.bindTooltip(buildIbkLabel(b), {
                permanent: true, direction: 'top',
                className: 'bank-label', offset: [0, -10]
            });

            m.on('click', function(){
                openIbkPopup(b, m);
            });

            allMarkers.push(m);
            ibkMarkers[b.name] = m;
            m.addTo(map);
        });
    }

    // IBK 마커/라벨 동적 갱신 (방문여부 변경 시)
    function ibkMarkerColor(b){
        return b.visit_status === 'Y' ? '#059669' : getBankColor('IBK기업은행');
    }
    function buildIbkLabel(b){
        var c = ibkMarkerColor(b);
        var html = '<div class="label-box" style="border-color:' + c + ';">' +
            '<div class="lbl-name">' + escHtml(b.name) + '</div>' +
            '<span class="lbl-bank" style="background:' + c + ';">IBK기업은행</span>';
        if(b.visit_status === 'Y'){
            html += '<span class="lbl-visit-done">✅ 방문</span>';
        }
        html += '</div>';
        return html;
    }
    function refreshIbkMarker(b){
        var m = ibkMarkers[b.name];
        if(!m) return;
        var c = ibkMarkerColor(b);
        m.setStyle({ fillColor: c });
        m.unbindTooltip();
        m.bindTooltip(buildIbkLabel(b), {
            permanent: true, direction: 'top',
            className: 'bank-label', offset: [0, -10]
        });
    }

    // ============================================================
    // 1·2차 단순 팝업
    // ============================================================
    function openSimpleBankPopup(marker){
        var p = marker._props;
        var c = getBankColor(p['은행명'] || '');
        var html = '<div class="popup-inner">' +
            '<div class="bank-tag" style="background:' + c + ';">' + escHtml(p['은행명'] || '') + '</div>' +
            '<div class="branch-name">' + escHtml(p['점포명'] || '') + '</div>' +
            '<div class="info-row"><b>지번</b> ' + escHtml(p['지번주소'] || '-') + '</div>' +
            '<div class="info-row"><b>도로명</b> ' + escHtml(p['도로명'] || '-') + '</div>' +
            '<div class="info-row"><b>전화</b> ' + escHtml(p['전화번호'] || '-') + '</div>' +
        '</div>';
        marker.unbindPopup();
        marker.bindPopup(html, { maxWidth: 300 }).openPopup();
    }

    // ============================================================
    // IBK 풀 팝업 (편집 가능)
    // ============================================================
    function openIbkPopup(b, marker){
        var c = getBankColor('IBK기업은행');
        var html = '<div class="popup-inner">' +
            '<div class="bank-tag" style="background:' + c + ';">IBK기업은행</div>' +
            '<div class="branch-name">' + escHtml(b.name) + '</div>' +
            '<div class="info-row"><b>지역본부</b> ' + escHtml(b.region || '-') + '</div>' +
            '<div class="info-row"><b>주소</b> ' + escHtml((b.sido || '') + ' ' + (b.sigungu || '')) + '</div>' +
            (b.group ? '<div class="info-row"><b>그룹</b> ' + escHtml(b.group) + '</div>' : '') +

            // I 시트 정보 + 비고
            '<div class="popup-section">' +
                '<h3>I. 지점 개요</h3>' +
                '<div class="info-row"><b>담당자</b> ' + escHtml(b.manager || '-') + '</div>' +
                '<div class="info-row"><b>등록상태</b> ' + escHtml(b.reg_status || '-') + '</div>' +
                '<div class="info-row"><b>방문여부</b> ' +
                    (b.visit_status === 'Y'
                        ? '<span style="color:#059669;font-weight:700;">✅ 방문완료</span>'
                        : '<span style="color:#d97706;font-weight:700;">📋 방문예정</span>') +
                '</div>' +
                '<div class="visit-row">' +
                    '<b>방문일</b>' +
                    '<input type="date" class="visit-date-input" value="' + escAttr(b.visit_date || '') + '">' +
                '</div>' +
                '<div style="margin-top:8px;font-size:11px;color:#4a5568;font-weight:600;">비고 (지점)</div>' +
                '<div class="note-edit">' +
                    '<textarea class="note-branch" placeholder="지점 관련 비고">' + escHtml(b.note_branch || '') + '</textarea>' +
                    '<button class="save-btn save-note-branch">저장</button>' +
                '</div>' +
            '</div>' +

            // II 시트 정보 + 이력별 비고 (행 단위 편집)
            '<div class="popup-section">' +
                '<h3>II. 담당자 개요</h3>' +
                buildHistoryTable(b.history) +
                (b.history && b.history.length ? '<div class="history-hint">💡 비고 칸을 클릭해 직접 편집 (자동 저장)</div>' : '') +
            '</div>' +
        '</div>';

        marker.unbindPopup();
        marker.bindPopup(html, {
            maxWidth: 360,
            autoPan: true,
            className: 'ibk-popup-wrap'
        }).openPopup();

        setTimeout(function(){ bindIbkPopupEvents(b, marker); }, 80);
    }

    function buildHistoryTable(history){
        if(!history || !history.length){
            return '<div class="history-empty">정감이력 없음</div>';
        }
        var rows = '<table class="history-table"><thead><tr>' +
            '<th>년/월</th><th>담당자</th><th>정감</th><th style="width:40%;">비고</th>' +
            '</tr></thead><tbody>';
        history.forEach(function(h, idx){
            rows += '<tr>' +
                '<td>' + (h.year || '') + (h.month ? '.' + h.month : '') + '</td>' +
                '<td>' + escHtml(h.person || '') + '</td>' +
                '<td>' + escHtml(h.appraiser || '') + '</td>' +
                '<td class="col-note">' +
                    '<input type="text" class="row-note-input" data-row-idx="' + h.rowIdx + '" data-history-idx="' + idx + '" ' +
                    'value="' + escAttr(h.note || '') + '" placeholder="비고 입력...">' +
                '</td>' +
            '</tr>';
        });
        rows += '</tbody></table>';
        return rows;
    }

    function bindIbkPopupEvents(b, marker){
        var noteBranchEl = document.querySelector('.note-branch');
        var btnBranch = document.querySelector('.save-note-branch');
        var dateInp = document.querySelector('.visit-date-input');

        // I 시트 지점 비고 (기존 유지)
        if(btnBranch){
            btnBranch.onclick = function(){
                var val = noteBranchEl.value;
                btnBranch.disabled = true;
                apiSave({ action: 'save_note', type: 'branch', name: b.name, value: val })
                    .then(function(){
                        b.note_branch = val;
                        updateList();
                        btnBranch.classList.add('saved');
                        btnBranch.textContent = '✓ 저장됨';
                        setTimeout(function(){
                            btnBranch.classList.remove('saved');
                            btnBranch.textContent = '저장';
                            btnBranch.disabled = false;
                        }, 1200);
                    })
                    .catch(function(){ btnBranch.disabled = false; });
            };
        }

        // 방문일 (변경 시 visit_status 도 자동으로 Y/N 으로 바뀜 - Code.gs 측에서 처리)
        if(dateInp){
            dateInp.onchange = function(){
                var newDate = this.value;
                apiSave({ action: 'save_visit', name: b.name, value: newDate })
                    .then(function(){
                        b.visit_date = newDate;
                        b.visit_status = newDate ? 'Y' : 'N';
                        refreshIbkMarker(b);
                        // 담당자 칩 카운트도 갱신
                        rebuildIbkManagerChips();
                        updateList();
                    })
                    .catch(function(){});
            };
        }

        // 이력별 비고 행 단위 편집 (자동 저장: blur 또는 Enter)
        var rowInputs = document.querySelectorAll('.row-note-input');
        rowInputs.forEach(function(inp){
            var rowIdx = parseInt(inp.dataset.rowIdx, 10);
            var historyIdx = parseInt(inp.dataset.historyIdx, 10);
            var originalVal = inp.value;

            function flashStatus(cls){
                inp.classList.remove('saving', 'saved', 'err');
                inp.classList.add(cls);
                if(cls === 'saved' || cls === 'err'){
                    setTimeout(function(){ inp.classList.remove(cls); }, 1500);
                }
            }

            function saveIfChanged(){
                var val = inp.value;
                if(val === originalVal) return;  // 변경 없음
                inp.classList.remove('saved', 'err');
                inp.classList.add('saving');
                apiSave({ action: 'save_history_note', rowIdx: rowIdx, name: b.name, value: val })
                    .then(function(){
                        b.history[historyIdx].note = val;
                        originalVal = val;
                        flashStatus('saved');
                        updateList();
                    })
                    .catch(function(err){
                        flashStatus('err');
                        // 실패 시 원복
                        inp.value = originalVal;
                    });
            }

            inp.addEventListener('blur', saveIfChanged);
            inp.addEventListener('keydown', function(e){
                if(e.key === 'Enter'){
                    e.preventDefault();
                    inp.blur();  // blur 트리거 → 저장
                } else if(e.key === 'Escape'){
                    inp.value = originalVal;
                    inp.blur();
                }
            });
        });
    }

    // ============================================================
    // 필터 상태
    // ============================================================
    var bankVisible = {};
    Object.keys(BANK_COLORS).forEach(function(b){ bankVisible[b] = true; });
    var searchKeyword = '';
    var ibkRegionFilter = 'all';
    var ibkManagerFilter = 'all';
    var ibkVisitFilter = 'all';      // 'all' | 'planned' | 'done'
    var ibkStaleOnly = false;        // 1년 이내 접수이력 없음만

    // ============================================================
    // 은행 필터 칩
    // ============================================================
    var bankFilterDiv = document.getElementById('bank-filters');

    // ============================================================
    // IBK 전용 필터 칩 (지역본부 / 담당자 / 방문상태 / 1년 이내)
    // ============================================================
    function buildIbkFilterChips(){
        var regions = {};
        var managerStats = {};  // { 김남솔: { total: 5, done: 2, planned: 3 }, ... }
        ibkData.forEach(function(b){
            if(b.region) regions[b.region] = (regions[b.region] || 0) + 1;
            if(b.manager){
                if(!managerStats[b.manager]) managerStats[b.manager] = { total: 0, done: 0, planned: 0 };
                managerStats[b.manager].total++;
                if(b.visit_status === 'Y') managerStats[b.manager].done++;
                else managerStats[b.manager].planned++;
            }
        });

        var rDiv = document.getElementById('ibk-region-filters');
        rDiv.innerHTML = '';
        addIbkChip(rDiv, '전체', 'all', true, function(){ setIbkRegion('all'); }, '#0051af');
        Object.keys(regions).sort().forEach(function(r){
            addIbkChip(rDiv, r + ' (' + regions[r] + ')', r, false, function(){ setIbkRegion(r); }, '#0051af');
        });

        var mDiv = document.getElementById('ibk-manager-filters');
        mDiv.innerHTML = '';
        addIbkChip(mDiv, '전체', 'all', true, function(){ setIbkManager('all'); }, '#0051af');
        Object.keys(managerStats).sort().forEach(function(m){
            var s = managerStats[m];
            // 형식: "김남솔 12 (예정 8/완료 4)"
            var label = m + ' ' + s.total + ' (예' + s.planned + '/완' + s.done + ')';
            addIbkChip(mDiv, label, m, false, function(){ setIbkManager(m); }, '#0051af');
        });

        // 방문 상태 필터 (3개 칩)
        ['all', 'planned', 'done'].forEach(function(val){
            var chip = document.getElementById('ibk-visit-' + val);
            chip.onclick = function(){ setIbkVisit(val); };
        });

        // 1년 이내 접수이력 없음 토글
        var staleChip = document.getElementById('ibk-stale-filter');
        staleChip.onclick = function(){
            ibkStaleOnly = !ibkStaleOnly;
            if(ibkStaleOnly){
                staleChip.classList.add('active');
                staleChip.style.background = '#dc2626';
                staleChip.style.color = 'white';
            } else {
                staleChip.classList.remove('active');
                staleChip.style.background = 'white';
                staleChip.style.color = '#dc2626';
            }
            applyFilters();
        };
    }
    function addIbkChip(parent, text, val, active, onClick, activeColor){
        var c = document.createElement('span');
        c.className = 'chip' + (active ? ' active' : '');
        c.textContent = text;
        c.dataset.val = val;
        c.dataset.activeColor = activeColor;
        if(active){
            c.style.background = activeColor;
            c.style.borderColor = activeColor;
            c.style.color = 'white';
        }
        c.onclick = onClick;
        parent.appendChild(c);
    }
    function setIbkRegion(val){
        ibkRegionFilter = val;
        document.querySelectorAll('#ibk-region-filters .chip').forEach(function(c){
            var on = c.dataset.val === val;
            c.classList.toggle('active', on);
            if(on){ c.style.background = c.dataset.activeColor; c.style.color = 'white'; }
            else { c.style.background = 'white'; c.style.color = ''; }
        });
        applyFilters();
    }
    function setIbkManager(val){
        ibkManagerFilter = val;
        document.querySelectorAll('#ibk-manager-filters .chip').forEach(function(c){
            var on = c.dataset.val === val;
            c.classList.toggle('active', on);
            if(on){ c.style.background = c.dataset.activeColor; c.style.color = 'white'; }
            else { c.style.background = 'white'; c.style.color = ''; }
        });
        applyFilters();
    }
    // 담당자 칩만 카운트 갱신 (방문여부 변경 시 호출)
    function rebuildIbkManagerChips(){
        var managerStats = {};
        ibkData.forEach(function(b){
            if(!b.manager) return;
            if(!managerStats[b.manager]) managerStats[b.manager] = { total: 0, done: 0, planned: 0 };
            managerStats[b.manager].total++;
            if(b.visit_status === 'Y') managerStats[b.manager].done++;
            else managerStats[b.manager].planned++;
        });
        document.querySelectorAll('#ibk-manager-filters .chip').forEach(function(c){
            var name = c.dataset.val;
            if(name === 'all') return;
            var s = managerStats[name];
            if(s){
                c.textContent = name + ' ' + s.total + ' (예' + s.planned + '/완' + s.done + ')';
            }
        });
    }

    function setIbkVisit(val){
        ibkVisitFilter = val;
        var colors = { all: '#0051af', planned: '#d97706', done: '#059669' };
        ['all', 'planned', 'done'].forEach(function(v){
            var c = document.getElementById('ibk-visit-' + v);
            if(v === val){
                c.classList.add('active');
                c.style.background = colors[v];
                c.style.color = 'white';
            } else {
                c.classList.remove('active');
                c.style.background = 'white';
                c.style.color = colors[v];
            }
        });

    }

    // ============================================================
    // 1년 이내 접수이력 없음 판정
    //  - 1년 이내에 정감자(appraiser)가 채워진 이력이 하나라도 있어야 not stale
    //  - 정감 안 된 의뢰 (year/month 만 있고 appraiser 비어있음) 는 유효 이력으로 인정 안 함
    //  - history 자체가 없으면 stale
    // ============================================================
    function isStale(b){
        if(!b.history || !b.history.length) return true;
        var now = new Date();
        var oneYearAgo = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate());
        for(var i = 0; i < b.history.length; i++){
            var h = b.history[i];
            if(!h.year || !h.month) continue;
            if(!h.appraiser || !String(h.appraiser).trim()) continue;  // 정감자 없는 행은 무시
            var d = new Date(Number(h.year), Number(h.month) - 1, 1);
            if(d >= oneYearAgo) return false;  // 1년 내 + 정감자 있음 → not stale
        }
        return true;
    }

    // ============================================================
    // 필터 적용
    // ============================================================
    function applyFilters(){
        var visible = 0;
        allMarkers.forEach(function(m){
            var ok = true;

            // 1. 은행 필터
            if(bankVisible[m._bankName] === false) ok = false;

            // 2. 검색
            if(ok && searchKeyword){
                var hay = (m._branchName || '').toLowerCase();
                if(m._isIBK){
                    var b = m._ibkData;
                    hay += ' ' + (b.region || '') + ' ' + (b.manager || '') +
                           ' ' + (b.sido || '') + ' ' + (b.sigungu || '');
                } else {
                    hay += ' ' + (m._props['지번주소'] || '') + ' ' + (m._props['도로명'] || '');
                }
                if(hay.toLowerCase().indexOf(searchKeyword) === -1) ok = false;
            }

            // 3. IBK 전용 필터 (IBK 마커에만 적용)
            if(ok && m._isIBK){
                var b = m._ibkData;
                if(ibkRegionFilter !== 'all' && b.region !== ibkRegionFilter) ok = false;
                if(ok && ibkManagerFilter !== 'all' && b.manager !== ibkManagerFilter) ok = false;

                // 방문 상태
                if(ok && ibkVisitFilter === 'planned' && b.visit_status !== 'N') ok = false;
                if(ok && ibkVisitFilter === 'done' && b.visit_status !== 'Y') ok = false;

                // 1년 이내 접수이력 없음
                if(ok && ibkStaleOnly && !isStale(b)) ok = false;
            }

            if(ok){
                if(!map.hasLayer(m)) map.addLayer(m);
                visible++;
            } else {
                if(map.hasLayer(m)) map.removeLayer(m);
            }
        });
        document.getElementById('visible-count').textContent = visible.toLocaleString();
        updateList();
    }

    // ============================================================
    // 사이드 목록
    // ============================================================
    function updateList(){
        var c = document.getElementById('list-container');
        var bounds = map.getBounds();
        var items = [];
        allMarkers.forEach(function(m){
            if(map.hasLayer(m) && bounds.contains(m.getLatLng())) items.push(m);
        });
        items.sort(function(a, b){
            return (a._branchName || '').localeCompare(b._branchName || '', 'ko');
        });

        if(!items.length){
            c.innerHTML = '<div class="empty-state">화면 내 표시할 지점이 없습니다</div>';
            return;
        }

        var html = '';
        var max = Math.min(items.length, 200);
        for(var i = 0; i < max; i++){
            var m = items[i];
            var col = getBankColor(m._bankName);
            html += '<div class="list-item" onclick="focusMarkerById(' + m._leaflet_id + ')">';
            html += '<span class="bank-badge" style="background:' + col + ';">' + escHtml(m._bankName) + '</span>';
            html += '<div class="name">' + escHtml(m._branchName) + '</div>';

            if(m._isIBK){
                var b = m._ibkData;
                html += '<div class="meta">' + escHtml(b.region || '') + ' · ' +
                        escHtml(b.sigungu || '') +
                        (b.group ? ' · ' + escHtml(b.group) : '') + '</div>';

                // 방문 상태 + 담당자
                var statusBadges = '';
                if(b.visit_status === 'Y'){
                    statusBadges += '<span style="font-size:10px;font-weight:700;color:#059669;background:#d1fae5;padding:1px 6px;border-radius:3px;margin-right:4px;border:1px solid #34d399;">✅ 방문</span>';
                } else {
                    statusBadges += '<span style="font-size:10px;font-weight:700;color:#d97706;background:#fef3c7;padding:1px 6px;border-radius:3px;margin-right:4px;border:1px solid #fbbf24;">📋 예정</span>';
                }
                if(isStale(b)){
                    statusBadges += '<span style="font-size:10px;font-weight:700;color:#dc2626;background:#fee2e2;padding:1px 6px;border-radius:3px;border:1px solid #f87171;">⚠️ 1년+</span>';
                }
                html += '<div style="margin-top:3px;">' + statusBadges + '</div>';

                if(b.manager) html += '<div class="ibk-info">👤 ' + escHtml(b.manager) + '</div>';

                var notePreview = '';
                if(b.note_branch){
                    notePreview = b.note_branch;
                } else if(b.history && b.history.length){
                    for(var hi = b.history.length - 1; hi >= 0; hi--){
                        if(b.history[hi].note){ notePreview = b.history[hi].note; break; }
                    }
                }
                notePreview = notePreview.substring(0, 30);
                if(notePreview){
                    html += '<div class="note-preview">📝 ' + escHtml(notePreview) +
                            (notePreview.length >= 30 ? '…' : '') + '</div>';
                }
            } else {
                var addr = m._props['지번주소'] || m._props['도로명'] || '';
                html += '<div class="meta">' + escHtml(addr) + '</div>';
            }

            html += '</div>';
        }
        if(items.length > 200) html += '<div class="empty-state">외 ' + (items.length - 200) + '건</div>';
        c.innerHTML = html;
    }

    function escHtml(s){
        return String(s == null ? '' : s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

    function syncIbkFromServer(){
        setSync('pending', '⏳ IBK 서버 로드 중…');
        apiLoad().then(function(res){
            if(!res.ok) throw new Error(res.error || '응답 오류');
            var serverData = res.data;
            serverData.forEach(function(sb){
                var local = ibkByName[sb.name];
                if(local){
                    if(sb.lat) local.lat = sb.lat;
                    if(sb.lng) local.lng = sb.lng;
                    local.note_branch = sb.note_branch || '';
                    local.visit_date = sb.visit_date || '';
                    local.visit_status = sb.visit_status || 'N';
                    local.manager = sb.manager || local.manager;
                    local.history = sb.history || local.history;
                    local.reg_status = sb.reg_status || '';
                    refreshIbkMarker(local);
                }
            });
            rebuildIbkManagerChips();
            applyFilters();
            setSync('ok', '✓ IBK 동기화 완료 ' + new Date().toLocaleTimeString('ko-KR'));
        }).catch(function(err){
            console.warn('IBK 서버 로드 실패:', err);
            setSync('err', '⚠ IBK 서버 연결 실패');
        });

    // 한 달치 이벤트 로드
    function loadCalendarMonth(){
        var firstDay = new Date(calState.viewYear, calState.viewMonth, 1);
        var lastDay = new Date(calState.viewYear, calState.viewMonth + 1, 0, 23, 59, 59);
        // 그리드는 이전/다음 달도 일부 보여주므로 살짝 더 넓게 가져오기
        var gridStart = new Date(firstDay); gridStart.setDate(gridStart.getDate() - 7);
        var gridEnd = new Date(lastDay); gridEnd.setDate(gridEnd.getDate() + 7);

        document.getElementById('cal-title').textContent = calState.viewYear + '년 ' + (calState.viewMonth + 1) + '월';
        renderCalGrid();  // 일단 빈 그리드 그리기

        apiCalLoad(formatYMD(gridStart), formatYMD(gridEnd))
            .then(function(events){
                calState.events = events;
                renderCalGrid();
                renderEventList();
            })
            .catch(function(err){
                console.warn('캘린더 로드 실패', err);
            });
    }

    function apiCalLoad(start, end){
        var url = API_URL + '?token=' + encodeURIComponent(API_TOKEN) +
                  '&action=cal_list&start=' + encodeURIComponent(start) + '&end=' + encodeURIComponent(end);
        return fetch(url).then(function(r){ return r.json(); }).then(function(res){
            if(!res.ok) throw new Error(res.error || '캘린더 로드 실패');
            return res.events || [];
        });
    }

    // 그리드 렌더링
    function renderCalGrid(){
        var grid = document.getElementById('cal-grid');
        var dows = ['일', '월', '화', '수', '목', '금', '토'];
        var html = '';
        dows.forEach(function(d, i){
            var cls = i === 0 ? 'sun' : (i === 6 ? 'sat' : '');
            html += '<div class="dow ' + cls + '">' + d + '</div>';
        });

        var firstDay = new Date(calState.viewYear, calState.viewMonth, 1);
        var lastDay = new Date(calState.viewYear, calState.viewMonth + 1, 0);
        var startDow = firstDay.getDay();  // 0=일

        // 이전 달 채우기
        var prevLast = new Date(calState.viewYear, calState.viewMonth, 0).getDate();
        for(var i = startDow - 1; i >= 0; i--){
            var d = prevLast - i;
            html += '<div class="cal-day other">' + d + '</div>';
        }

        // 이번 달
        var todayYMD = formatYMD(new Date());
        for(var d = 1; d <= lastDay.getDate(); d++){
            var dt = new Date(calState.viewYear, calState.viewMonth, d);
            var ymd = formatYMD(dt);
            var dow = dt.getDay();
            var dowCls = dow === 0 ? 'sun' : (dow === 6 ? 'sat' : '');
            var todayCls = ymd === todayYMD ? 'today' : '';
            var selCls = ymd === calState.selectedDate ? 'selected' : '';
            // 이 날짜의 이벤트 색상 점들 (담당자별)
            var dayEvents = calState.events.filter(function(e){ return e.date === ymd; });
            var membersInDay = {};
            dayEvents.forEach(function(e){
                var m = e.member || '_';
                membersInDay[m] = (MEMBER_HEX[m] || '#a0aec0');
            });
            var dotsHtml = '';
            var memList = Object.keys(membersInDay).slice(0, 4);
            memList.forEach(function(m){
                dotsHtml += '<span class="dot" style="background:' + membersInDay[m] + ';"></span>';
            });
            if(Object.keys(membersInDay).length > 4) dotsHtml += '<span class="dot" style="background:#cbd5e0;"></span>';

            html += '<div class="cal-day ' + dowCls + ' ' + todayCls + ' ' + selCls + '" data-ymd="' + ymd + '">' +
                d + '<div class="dots">' + dotsHtml + '</div></div>';
        }

        // 다음 달 채우기 (총 6주 = 42칸 맞추기)
        var totalCells = startDow + lastDay.getDate();
        var trailing = (7 - (totalCells % 7)) % 7;
        for(var i = 1; i <= trailing; i++){
            html += '<div class="cal-day other">' + i + '</div>';
        }

        grid.innerHTML = html;

        // 셀 클릭 → 선택일 변경
        grid.querySelectorAll('.cal-day[data-ymd]').forEach(function(el){
            el.onclick = function(){
                calState.selectedDate = this.dataset.ymd;
                renderCalGrid();
                renderEventList();
            };
        });
    }

    // 선택일 이벤트 리스트
    function renderEventList(){
        var list = document.getElementById('cal-events-list');
        var dateLbl = document.getElementById('cal-events-date');
        var d = calState.selectedDate;
        var parts = d.split('-');
        dateLbl.textContent = Number(parts[1]) + '월 ' + Number(parts[2]) + '일';

        var dayEvents = calState.events.filter(function(e){ return e.date === d; });
        // 시간순 정렬
        dayEvents.sort(function(a, b){
            if(a.allDay && !b.allDay) return -1;
            if(!a.allDay && b.allDay) return 1;
            return (a.startTime || '').localeCompare(b.startTime || '');
        });

        if(!dayEvents.length){
            list.innerHTML = '<div class="cal-events-empty">일정 없음</div>';
            return;
        }

        var html = '';
        dayEvents.forEach(function(e){
            var color = MEMBER_HEX[e.member] || '#a0aec0';
            var timeStr = e.allDay ? '🌐 종일' : (e.startTime + (e.endTime ? ' - ' + e.endTime : ''));
            html += '<div class="cal-event-item" data-id="' + escAttr(e.id) + '">' +
                '<div class="ev-color" style="background:' + color + ';"></div>' +
                '<div class="ev-content">' +
                    '<div class="ev-time">' + timeStr + (e.member ? ' · ' + escHtml(e.member) : '') + '</div>' +
                    '<div class="ev-title">' + escHtml(e.title) + '</div>' +
                    (e.location ? '<div class="ev-meta">📍 ' + escHtml(e.location) + '</div>' : '') +
                    (e.description ? '<div class="ev-meta">📝 ' + escHtml(e.description.substring(0, 60)) + (e.description.length > 60 ? '…' : '') + '</div>' : '') +
                '</div>' +
            '</div>';
        });
        list.innerHTML = html;

        // 이벤트 클릭 → 수정 모달
        list.querySelectorAll('.cal-event-item').forEach(function(el){
            el.onclick = function(){
                var id = this.dataset.id;
                var ev = dayEvents.find(function(e){ return e.id === id; });
                if(ev) openCalModal(ev);
            };
        });
    }

    // ========== 모달 ==========
    var modal = document.getElementById('cal-modal');
    var memberSel = document.getElementById('cal-f-member');
    TEAM_MEMBERS.forEach(function(m){
        var opt = document.createElement('option');
        opt.value = m; opt.textContent = m;
        memberSel.appendChild(opt);
    });

    document.getElementById('cal-add-btn').onclick = function(){
        openCalModal(null);
    };
    document.getElementById('cal-btn-cancel').onclick = closeCalModal;
    document.getElementById('cal-f-allday').onchange = function(){
        document.getElementById('cal-f-time-row').style.display = this.checked ? 'none' : '';
    };

    function openCalModal(event){
        calState.editingId = event ? event.id : null;
        document.getElementById('cal-modal-title').textContent = event ? '일정 수정' : '일정 추가';
        document.getElementById('cal-btn-delete').style.display = event ? '' : 'none';
        document.getElementById('cal-f-title').value = event ? event.title : '';
        document.getElementById('cal-f-member').value = event ? (event.member || '') : '';
        document.getElementById('cal-f-allday').checked = event ? !!event.allDay : false;
        document.getElementById('cal-f-time-row').style.display = (event && event.allDay) ? 'none' : '';
        document.getElementById('cal-f-date').value = event ? event.date : calState.selectedDate;
        document.getElementById('cal-f-start').value = event && event.startTime ? event.startTime : '09:00';
        document.getElementById('cal-f-end').value = event && event.endTime ? event.endTime : '10:00';
        document.getElementById('cal-f-location').value = event ? (event.location || '') : '';
        document.getElementById('cal-f-desc').value = event ? (event.description || '') : '';
        modal.classList.add('visible');
    }
    function closeCalModal(){
        modal.classList.remove('visible');
        calState.editingId = null;
    }

    document.getElementById('cal-btn-save').onclick = function(){
        var btn = this;
        var payload = {
            action: calState.editingId ? 'cal_update' : 'cal_add',
            title: document.getElementById('cal-f-title').value.trim() || '(제목 없음)',
            member: document.getElementById('cal-f-member').value,
            allDay: document.getElementById('cal-f-allday').checked,
            date: document.getElementById('cal-f-date').value,
            startTime: document.getElementById('cal-f-start').value,
            endTime: document.getElementById('cal-f-end').value,
            location: document.getElementById('cal-f-location').value,
            description: document.getElementById('cal-f-desc').value
        };
        if(!payload.date){ alert('날짜를 입력하세요'); return; }
        if(calState.editingId) payload.id = calState.editingId;

        btn.disabled = true; btn.textContent = '저장 중…';
        apiSave(payload).then(function(){
            closeCalModal();
            calState.selectedDate = payload.date;
            // 선택일이 다른 달이면 그쪽으로 이동
            var newD = new Date(payload.date);
            calState.viewYear = newD.getFullYear();
            calState.viewMonth = newD.getMonth();
            loadCalendarMonth();
            btn.disabled = false; btn.textContent = '저장';
        }).catch(function(err){
            alert('저장 실패: ' + err.message);
            btn.disabled = false; btn.textContent = '저장';
        });
    };

    document.getElementById('cal-btn-delete').onclick = function(){
        if(!calState.editingId) return;
        if(!confirm('이 일정을 삭제하시겠습니까?')) return;
        var btn = this;
        btn.disabled = true; btn.textContent = '삭제 중…';
        apiSave({ action: 'cal_delete', id: calState.editingId }).then(function(){
            closeCalModal();
            loadCalendarMonth();
            btn.disabled = false; btn.textContent = '삭제';
        }).catch(function(err){
            alert('삭제 실패: ' + err.message);
            btn.disabled = false; btn.textContent = '삭제';
        });
    };

    // 모달 바깥 클릭으로 닫기
    modal.addEventListener('click', function(e){
        if(e.target === modal) closeCalModal();
    });

    // 30초마다 캘린더도 자동 새로고침 (열려있을 때만)
    setInterval(function(){
        if(document.getElementById('cal-floating').classList.contains('visible')){
            loadCalendarMonth();
        }
    }, 30000);
    </script>
</body>
</html>
