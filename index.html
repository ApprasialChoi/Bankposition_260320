        <!-- ========== 로그인 화면 ========== -->
        <div id="login-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(135deg,#0f172a,#1e3a5f); z-index:99999; display:flex; justify-content:center; align-items:center;">
            <div style="background:white; border-radius:20px; padding:48px 40px; width:380px; box-shadow:0 20px 60px rgba(0,0,0,0.4); text-align:center;">
                <div style="font-size:48px; margin-bottom:12px;">🗺️</div>
                <h2 style="margin:0 0 6px; font-size:22px; color:#1e293b;">중앙감정 GIS</h2>
                <p style="margin:0 0 28px; font-size:13px; color:#94a3b8;">접속하려면 비밀번호를 입력하세요</p>
                <input type="password" id="login-pw" placeholder="비밀번호 입력" style="width:100%; padding:14px 16px; border:2px solid #e2e8f0; border-radius:12px; font-size:15px; box-sizing:border-box; outline:none; transition:border 0.2s;" onfocus="this.style.borderColor='#0051af'" onblur="this.style.borderColor='#e2e8f0'" onkeydown="if(event.key==='Enter') doLogin()">
                <div id="login-error" style="color:#dc2626; font-size:12px; margin-top:8px; min-height:18px;"></div>
                <button onclick="doLogin()" style="width:100%; padding:14px; background:linear-gradient(135deg,#0051af,#0077ed); color:white; border:none; border-radius:12px; font-size:16px; font-weight:bold; cursor:pointer; margin-top:8px; transition:opacity 0.2s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">로그인</button>
            </div>
        </div>
        <script>
        var SITE_PASSWORD = 'q9500!';
        function doLogin() {
            var pw = document.getElementById('login-pw').value;
            if (pw === SITE_PASSWORD) { document.getElementById('login-screen').style.display = 'none'; sessionStorage.setItem('authenticated', 'yes'); }
            else { document.getElementById('login-error').textContent = '비밀번호가 올바르지 않습니다.'; document.getElementById('login-pw').style.borderColor = '#dc2626'; document.getElementById('login-pw').value = ''; document.getElementById('login-pw').focus(); }
        }
        if (sessionStorage.getItem('authenticated') === 'yes') { document.getElementById('login-screen').style.display = 'none'; }
        </script>

        <div id="side-dashboard" style="position: fixed; top: 0; left: 0; width: 350px; height: 100%; background: white; z-index: 3000; box-shadow: 2px 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column;">
            <div style="padding: 20px; border-bottom: 1px solid #eee; background: #f8f9fa;">
                <h2 style="margin: 0; font-size: 18px; color: #333;">매물 리스트 <span id="list-count" style="color: #0051af;">0</span></h2>
            </div>
            <div id="list-container" style="flex: 1; overflow-y: auto; padding: 10px;"></div>
        </div>
        <div id="kakao-map"></div>
        <div id="map"></div>
        <div id="roadview-panel" style="display:none; position:fixed; bottom:0; left:350px; right:0; height:35%; z-index:2000; background:#000; border-top:3px solid #0051af;">
            <div style="position:absolute; top:0; left:0; right:0; height:32px; background:#0051af; display:flex; align-items:center; padding:0 12px; z-index:1;">

                <span id="roadview-address" style="color:#cce4ff; font-size:12px; margin-left:10px;"></span>
                <button onclick="closeRoadview()" style="margin-left:auto; background:transparent; border:none; color:white; font-size:18px; cursor:pointer; line-height:1;">✕</button>
            </div>

        </div>

        <div class="filter-panel" style="position: fixed; top: 20px; left: 370px; z-index: 2000; background: white; padding: 10px 14px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 700px; font-family: sans-serif;">
            <div style="display: flex; align-items: center; margin-bottom: 8px;">
                <h4 style="margin: 0; font-size: 13px; color: #333;">상세 필터</h4>
                <span id="filter-layer-badge" style="font-size:11px; color:#fff; background:#0051af; padding:2px 7px; border-radius:10px; margin-left:8px;">A 데이터</span>
                <span id="filter-result-count" style="font-size:12px; color:#0051af; font-weight:bold; margin-left:auto;"></span>
                <button onclick="openBuildingSearchModal()" style="margin-left:10px; padding:4px 10px; background-color:#0051af; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold; font-size:11px; white-space:nowrap;">🏗️ 건축물 검색</button>
                <button onclick="exportToExcel()" style="margin-left:6px; padding:4px 10px; background-color:#28a745; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold; font-size:11px; white-space:nowrap;">📊 엑셀 저장</button>
            </div>
            <div id="dynamic-filter-inputs" style="display:flex; flex-wrap:wrap; gap:6px; align-items:flex-end;"></div>
            <div style="display:flex; align-items:center; gap:16px; margin-top:8px; padding-top:8px; border-top:1px solid #eee; flex-wrap:wrap;">
                <div style="display:flex; align-items:center; gap:10px; font-size:12px;">
                    <span style="font-size:11px; font-weight:bold; color:#555; white-space:nowrap;">🗺️ 지도</span>
                    <label style="display:flex; align-items:center; gap:3px; cursor:pointer; white-space:nowrap;"><input type="checkbox" class="kakao-layer-toggle" data-type="USE_DISTRICT"> 지적편집도</label>
                    <label style="display:flex; align-items:center; gap:3px; cursor:pointer; white-space:nowrap;"><input type="checkbox" class="kakao-layer-toggle" data-type="TRAFFIC"> 🚦 교통</label>
                    <label style="display:flex; align-items:center; gap:3px; cursor:pointer; white-space:nowrap;"><input type="checkbox" class="kakao-layer-toggle" data-type="ROADVIEW"> 📷 로드뷰</label>
                </div>
                <div style="width:1px; height:18px; background:#ddd;"></div>
                <div style="display:flex; align-items:center; gap:6px; font-size:12px;">
                    <span style="font-size:11px; font-weight:bold; color:#0051af; white-space:nowrap;">📂 GeoJSON</span>
                    <input type="file" id="external-geojson-input" accept=".json,.geojson" style="font-size:11px;">
                </div>
            </div>
            <div id="external-label-controls"></div>
        </div>

        <!-- 건축물 검색 모달 (수정됨: 미리보기 테이블 제거, 버튼 1개) -->
        <div class="building-modal-overlay" id="buildingModal">
            <div class="building-modal">
                <div class="building-modal-header">
                    <h3>🏗️ 건축물대장 + 소유권 검색</h3>
                    <button onclick="closeBuildingModal()" style="background:none; border:none; color:white; font-size:22px; cursor:pointer;">✕</button>
                </div>
                <div class="building-modal-body">
                    <div class="bm-row">
                        <div class="bm-field"><label>시도 *</label><input type="text" id="bm-sido" placeholder="예: 경기도" value="경기도"></div>
                        <div class="bm-field"><label>시군구 *</label><input type="text" id="bm-sigungu" placeholder="예: 이천시"></div>
                    </div>
                    <div class="bm-row">
                        <div class="bm-field"><label>읍면동 (비우면 전체 순회)</label><input type="text" id="bm-eupmyeondong" placeholder="예: 장호원읍"></div>
                        <div class="bm-field"><label>리 (선택)</label><input type="text" id="bm-ri" placeholder="예: 장호원리"></div>
                    </div>
                    <div class="bm-field"><label>검색 용도 (콤마 구분)</label><input type="text" id="bm-uses" placeholder="예: 창고시설,창고" value="창고시설,창고"></div>
                    <div id="bm-server-status" style="font-size:12px; color:#888; margin-bottom:8px;"></div>
                    <button class="bm-btn-run" id="bm-run-btn" onclick="runBuildingSearch()">🔍 검색 시작 (건축물+소유권)</button>
                    <div class="bm-progress" id="bm-progress">
                        <div style="display:flex; justify-content:space-between; font-size:13px;">
                            <span id="bm-progress-text">준비 중...</span>
                            <span id="bm-progress-count" style="font-weight:bold; color:#0051af;">0건</span>
                        </div>
                        <div class="bm-progress-bar"><div class="bm-progress-fill" id="bm-progress-fill"></div></div>
                    </div>
                    <div class="bm-result" id="bm-result">
                        <div style="display:flex; align-items:center; justify-content:space-between;">
                            <span style="font-weight:bold; font-size:15px;">📋 검색 결과: <span id="bm-result-count" style="color:#0051af;">0</span>건</span>
                            <a class="bm-download-btn" id="bm-download-btn" href="#" style="display:none;">📥 엑셀 다운로드</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
        var map = L.map('map', { zoomControl:false, maxZoom:28, minZoom:1 }).fitBounds([[37.43966984122166,126.86818683641245],[37.6101521616503,127.1412179712234]]);
        initKakaoBaseMap(map, { mapTypeId: 'ROADMAP' });
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        var tooltipOffsets = {};
        function getFeatureId(feature) { var p = feature.properties; return p['감정서번호'] || p['빌딩명'] || p['호텔명'] || p['골프장명(인수 후 명칭)'] || p['물류센터명'] || p['명칭'] || p['소재지(통'] || (p['위도'] + '_' + p['경도']) || JSON.stringify(p).substring(0, 80); }
        function getStoredOffset(feature, defaultOffset) { var fid = getFeatureId(feature); if (tooltipOffsets[fid]) return [tooltipOffsets[fid].x, tooltipOffsets[fid].y]; return defaultOffset; }
        function makeDraggableTooltip(layer) { if (!layer.getTooltip || !layer.getTooltip()) return; var tooltip = layer.getTooltip(); var el = tooltip.getElement(); if (!el || el._dragReady) return; el._dragReady = true; el.classList.add('draggable-tooltip'); var fid = getFeatureId(layer.feature); el.addEventListener('mousedown', function(e) { if (e.button !== 0) return; e.stopPropagation(); e.preventDefault(); var startX = e.clientX, startY = e.clientY; var cur = tooltipOffsets[fid] || { x: tooltip.options.offset[0], y: tooltip.options.offset[1] }; map.dragging.disable(); el.style.cursor = 'grabbing'; function onMove(ev) { var nx = cur.x + (ev.clientX - startX); var ny = cur.y + (ev.clientY - startY); tooltip.options.offset = [nx, ny]; tooltipOffsets[fid] = { x: nx, y: ny }; if (layer.getLatLng) tooltip.setLatLng(layer.getLatLng()); } function onUp() { map.dragging.enable(); el.style.cursor = 'grab'; document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); } document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp); }); }
        function bindDraggableTooltip(layer, content, className, defaultOffset) { var offset = getStoredOffset(layer.feature, defaultOffset); layer.bindTooltip(content, { permanent: true, direction: 'top', className: className, offset: offset }); layer.on('tooltipopen', function() { setTimeout(function() { makeDraggableTooltip(layer); }, 50); }); }
        </script>
