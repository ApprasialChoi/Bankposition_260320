<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>은행 지점 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; font-family: 'Pretendard', -apple-system, sans-serif; overflow: hidden; }

        /* ===== 지도 영역 ===== */
        #map, #kakao-map {
            position: absolute; top: 0; right: 0; bottom: 0;
            left: 320px; width: calc(100% - 320px);
        }
        #kakao-map { z-index: 0; }
        #map { z-index: 1; background: transparent; }

        /* ===== 사이드 패널 (데스크탑) ===== */
        #side-panel {
            position: fixed; top: 0; left: 0; width: 320px; height: 100%;
            background: #fff; z-index: 3000; display: flex; flex-direction: column;
            box-shadow: 2px 0 12px rgba(0,0,0,0.08);
        }
        .panel-header { padding: 20px; background: linear-gradient(135deg, #1a365d, #2b6cb0); color: white; }
        .panel-header h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .panel-header .subtitle { font-size: 11px; opacity: 0.8; }
        .panel-count { font-size: 13px; margin-top: 8px; font-weight: 600; }
        .panel-count span { color: #fbd38d; }
        .filter-section { padding: 12px 16px; border-bottom: 1px solid #edf2f7; }
        .filter-section label { font-size: 11px; font-weight: 600; color: #718096; display: block; margin-bottom: 6px; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 4px; }
        .bank-chip {
            padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
            cursor: pointer; border: 1.5px solid #e2e8f0; background: white; transition: all 0.15s; user-select: none;
        }
        .bank-chip.active { color: white; border-color: transparent; }
        .bank-chip:hover { transform: scale(1.05); }
        .search-input {
            width: 100%; padding: 8px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
            font-size: 12px; outline: none; margin-top: 8px;
        }
        .search-input:focus { border-color: #2b6cb0; }
        #list-container { flex: 1; overflow-y: auto; }
        .list-item { padding: 12px 16px; border-bottom: 1px solid #f7fafc; cursor: pointer; transition: background 0.15s; }
        .list-item:hover { background: #f0f7ff; }
        .list-item .bank-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; color: white; margin-bottom: 4px; }
        .list-item .name { font-size: 14px; font-weight: 700; color: #2d3748; }
        .list-item .addr { font-size: 11px; color: #a0aec0; margin-top: 3px; }
        .list-item .phone { font-size: 11px; color: #718096; margin-top: 2px; }
        .list-item .manager { font-size: 11px; color: #2b6cb0; margin-top: 2px; font-weight: 600; }

        /* ===== 팝업 ===== */
        .leaflet-popup-content-wrapper { border-radius: 12px !important; border: none !important; box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important; }
        .leaflet-popup-content { margin: 0 !important; width: 280px !important; }
        .popup-inner { padding: 16px; }
        .popup-inner .bank-tag { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; color: white; margin-bottom: 8px; }
        .popup-inner .name { font-size: 16px; font-weight: 800; color: #1a202c; margin-bottom: 8px; }
        .popup-inner .info-row { font-size: 12px; color: #4a5568; margin-bottom: 4px; }
        .popup-inner .info-row b { color: #2d3748; min-width: 50px; display: inline-block; }
        .popup-inner .manager-edit {
            display: flex; align-items: center; gap: 6px; margin-top: 8px;
            padding-top: 8px; border-top: 1px solid #edf2f7;
        }
        .popup-inner .manager-edit b { color: #2d3748; font-size: 12px; min-width: 50px; flex-shrink: 0; }
        .popup-inner .manager-edit input {
            flex: 1; padding: 4px 8px; border: 1.5px solid #e2e8f0; border-radius: 6px;
            font-size: 12px; outline: none; font-family: inherit; min-width: 0;
        }
        .popup-inner .manager-edit input:focus { border-color: #2b6cb0; }
        .popup-inner .manager-edit .save-btn {
            padding: 4px 10px; background: #2b6cb0; color: white; border: none;
            border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; flex-shrink: 0;
            transition: background 0.15s;
        }
        .popup-inner .manager-edit .save-btn:hover { background: #1a365d; }
        .empty-state { padding: 40px 20px; text-align: center; color: #a0aec0; font-size: 13px; }

        /* ===== 라벨 ===== */
        .leaflet-tooltip.bank-label { background-color: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; display: block !important; }
        .leaflet-tooltip-top.bank-label:before { display: none !important; }
        .bank-tooltip-box:empty { display: none !important; }
        .bank-tooltip-box {
            background-color: #ffffff !important; border: 2px solid #3388ff !important; border-radius: 6px !important;
            padding: var(--label-padding, 4px 8px) !important; box-shadow: 0 2px 8px rgba(0,0,0,0.2) !important;
            text-align: center; min-width: var(--label-min-width, 60px); max-width: var(--label-max-width, 180px);
            transform: scale(var(--label-scale, 1)); transform-origin: center bottom; transition: transform 0.15s ease;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .bank-tooltip-box .label-name { font-weight: bold !important; color: #1a202c !important; font-size: var(--label-font-main, 11px) !important; }
        .bank-tooltip-box .label-bank { font-size: var(--label-font-sub, 9px) !important; color: #fff !important; padding: 1px 5px; border-radius: 3px; display: inline-block; margin-top: 2px; }
        .bank-tooltip-box .label-manager { font-size: var(--label-font-sub, 9px) !important; color: #2b6cb0 !important; font-weight: 600; margin-top: 1px; }
        .leaflet-tooltip.draggable-tooltip { cursor: grab !important; }
        .leaflet-tooltip.draggable-tooltip:active { cursor: grabbing !important; }
        .labels-hidden .bank-label { display: none !important; }
        .label-toggle-ctrl { background: rgba(255,255,255,0.95); padding: 8px 10px; border-radius: 6px; box-shadow: 0 1px 5px rgba(0,0,0,0.3); font: 12px/1.3 sans-serif; }
        .label-toggle-ctrl button { font-size: 10px; padding: 3px 8px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #fff; margin-right: 4px; }
        .label-toggle-ctrl button:hover { background: #f0f7ff; }

        /* ===== 모바일 토글 버튼 (데스크탑에선 숨김) ===== */
        #mobile-panel-toggle {
            display: none;
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 4000; background: linear-gradient(135deg, #1a365d, #2b6cb0);
            color: white; border: none; border-radius: 30px; padding: 12px 24px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 16px rgba(26,54,93,0.4);
            transition: all 0.2s;
        }
        #mobile-panel-toggle:active { transform: translateX(-50%) scale(0.95); }

        /* ===== 모바일 드로어 핸들 (데스크탑에선 숨김) ===== */
        .drawer-handle {
            display: none;
            width: 40px; height: 4px; background: #cbd5e0; border-radius: 2px;
            margin: 10px auto 6px;
        }

        /* ===== 모바일 오버레이 ===== */
        #panel-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3); z-index: 2999;
        }

        /* =========================================================
           모바일 반응형 (768px 이하)
           ========================================================= */
        @media (max-width: 768px) {
            #map, #kakao-map { left: 0; width: 100%; top: 0; bottom: 0; }
            #side-panel {
                position: fixed; top: auto; left: 0; right: 0; bottom: 0;
                width: 100%; height: 55vh;
                border-radius: 16px 16px 0 0;
                box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
                transform: translateY(100%);
                transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            }
            #side-panel.open { transform: translateY(0); }
            .drawer-handle { display: block; }
            .panel-header { padding: 6px 16px 12px; border-radius: 16px 16px 0 0; }
            .panel-header h1 { font-size: 16px; }
            .filter-section { padding: 10px 14px; }
            .bank-chip { padding: 3px 8px; font-size: 10px; }
            .search-input { font-size: 14px; padding: 10px 12px; }
            .list-item { padding: 10px 14px; }
            .list-item .name { font-size: 13px; }
            #mobile-panel-toggle { display: block; }
            #side-panel.open ~ #mobile-panel-toggle { display: none; }
            #side-panel.open ~ #panel-overlay { display: block; }
            .leaflet-popup-content { width: 240px !important; }
            .popup-inner .name { font-size: 14px; }
            .label-toggle-ctrl { font-size: 11px; }
            .label-toggle-ctrl button { font-size: 9px; padding: 4px 8px; }
        }
        @media (max-width: 380px) {
            #side-panel { height: 60vh; }
            .panel-header h1 { font-size: 15px; }
            .bank-chip { font-size: 9px; padding: 2px 6px; }
        }
    </style>
</head>
<body>
    <div id="side-panel">
        <div class="drawer-handle"></div>
        <div class="panel-header">
            <h1>🏦 은행 지점 지도</h1>
            <div class="subtitle">서울 · 인천 · 경기 은행 지점 현황</div>
            <div class="panel-count">표시 중: <span id="visible-count">0</span>건</div>
        </div>
        <div class="filter-section">
            <label>은행 필터 (클릭으로 ON/OFF)</label>
            <div class="filter-row" id="bank-filters"></div>
            <div class="filter-row" style="margin-top:8px;">
                <span class="bank-chip active" id="mgr-filter-all" style="background:#2b6cb0;border-color:#2b6cb0;">전체</span>
                <span class="bank-chip" id="mgr-filter-yes" style="color:#38a169;border-color:#38a169;">✓ 담당자 있음</span>
                <span class="bank-chip" id="mgr-filter-no" style="color:#e53e3e;border-color:#e53e3e;">✗ 담당자 없음</span>
            </div>
            <input type="text" class="search-input" id="addr-filter" placeholder="주소 검색 (예: 강남, 분당, 담당자명)">
        </div>
        <div id="list-container"><div class="empty-state">지도를 움직이면 목록이 나타납니다</div></div>
    </div>
    <div id="panel-overlay"></div>
    <button id="mobile-panel-toggle">📋 목록 보기</button>
    <div id="kakao-map"></div>
    <div id="map"></div>

    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=231190ac1aca72ada0b739110d8a0eb4"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/kakao_base.js"></script>
    <script src="data/bank_1st.js"></script>
    <script src="data/bank_2nd.js"></script>
    <script>
    // ========== 모바일 드로어 토글 ==========
    (function(){
        var panel = document.getElementById('side-panel');
        var toggleBtn = document.getElementById('mobile-panel-toggle');
        var overlay = document.getElementById('panel-overlay');
        function openPanel(){ panel.classList.add('open'); }
        function closePanel(){ panel.classList.remove('open'); }
        toggleBtn.addEventListener('click', openPanel);
        overlay.addEventListener('click', closePanel);
        var handle = panel.querySelector('.drawer-handle');
        var startY = 0, panelOpen = false;
        handle.addEventListener('touchstart', function(e){ startY = e.touches[0].clientY; panelOpen = panel.classList.contains('open'); }, {passive:true});
        handle.addEventListener('touchend', function(e){ var dy = e.changedTouches[0].clientY - startY; if(panelOpen && dy > 60) closePanel(); }, {passive:true});
    })();

    var BANK_COLORS = {
        'IBK기업은행':'#0051af','NH농협은행':'#00a651','신한은행':'#0046ff',
        'iM뱅크(구 대구은행)':'#aa1f2e','BNK부산은행':'#e31837','광주은행':'#d4a017',
        'BNK경남은행':'#f26522','KB국민은행':'#ffb300','하나은행':'#009688',
        '새마을금고':'#6a1b9a','Sh수협은행':'#0277bd'
    };
    function getBankColor(n){ return BANK_COLORS[n]||'#888'; }

    // ========== localStorage 담당자 저장 ==========
    var STORAGE_KEY = 'bankmap_managers';
    function loadManagerData(){
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e){ return {}; }
    }
    function saveManagerData(data){
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){}
    }
    var managerData = loadManagerData();

    function getManager(mid){ return managerData[mid] || ''; }
    function setManager(mid, val){
        if(val) managerData[mid] = val; else delete managerData[mid];
        saveManagerData(managerData);
    }

    var map = L.map('map',{zoomControl:true,maxZoom:19,minZoom:7,attributionControl:false}).setView([37.5,127.0],10);
    initKakaoBaseMap(map,{mapTypeId:'ROADMAP'});

    // ========== 줌 레벨별 라벨 크기 ==========
    var labelScaleConfig = [
        {maxZoom:10,scale:0.5,fontMain:'8px',fontSub:'7px',padding:'2px 4px',minW:'40px',maxW:'100px'},
        {maxZoom:12,scale:0.65,fontMain:'9px',fontSub:'7px',padding:'3px 5px',minW:'50px',maxW:'120px'},
        {maxZoom:13,scale:0.75,fontMain:'10px',fontSub:'8px',padding:'3px 6px',minW:'55px',maxW:'140px'},
        {maxZoom:14,scale:0.85,fontMain:'10px',fontSub:'8px',padding:'4px 7px',minW:'60px',maxW:'150px'},
        {maxZoom:15,scale:0.92,fontMain:'11px',fontSub:'9px',padding:'4px 8px',minW:'65px',maxW:'160px'},
        {maxZoom:16,scale:1.00,fontMain:'11px',fontSub:'9px',padding:'4px 8px',minW:'70px',maxW:'180px'},
        {maxZoom:17,scale:1.05,fontMain:'12px',fontSub:'10px',padding:'5px 9px',minW:'75px',maxW:'200px'},
        {maxZoom:99,scale:1.10,fontMain:'13px',fontSub:'10px',padding:'5px 10px',minW:'80px',maxW:'220px'}
    ];
    function updateLabelScale(){
        var z=map.getZoom(),cfg=labelScaleConfig[labelScaleConfig.length-1];
        for(var i=0;i<labelScaleConfig.length;i++){if(z<=labelScaleConfig[i].maxZoom){cfg=labelScaleConfig[i];break;}}
        var r=document.documentElement;
        r.style.setProperty('--label-scale',cfg.scale);
        r.style.setProperty('--label-font-main',cfg.fontMain);
        r.style.setProperty('--label-font-sub',cfg.fontSub);
        r.style.setProperty('--label-padding',cfg.padding);
        r.style.setProperty('--label-min-width',cfg.minW);
        r.style.setProperty('--label-max-width',cfg.maxW);
    }
    map.on('zoomend',updateLabelScale); updateLabelScale();

    // ========== 연결선 ==========
    var connectorLines={};
    function getMid(p){return(p['점포명']||'')+'_'+(p['은행명']||'')+'_'+(p['지번주소']||'');}
    function updateConnectorLine(layer){
        if(!layer.getTooltip||!layer.getTooltip()||!layer.getLatLng)return;
        var mid=getMid(layer._props||{}),tt=layer.getTooltip(),off=tt.options.offset||[0,0];
        if(Math.sqrt(off[0]*off[0]+off[1]*off[1])<15){if(connectorLines[mid]){map.removeLayer(connectorLines[mid]);delete connectorLines[mid];}return;}
        var c=getBankColor((layer._props||{})['은행명']||''),ml=layer.getLatLng(),mp=map.latLngToContainerPoint(ml);
        var lp=L.point(mp.x+off[0],mp.y+off[1]),ll=map.containerPointToLatLng(lp);
        if(connectorLines[mid]){connectorLines[mid].setLatLngs([ml,ll]);connectorLines[mid].setStyle({color:c});}
        else{connectorLines[mid]=L.polyline([ml,ll],{color:c,weight:1.5,dashArray:'4,3',opacity:0.6,interactive:false}).addTo(map);}
    }
    function updateAllConnectors(){allMarkers.forEach(function(m){if(map.hasLayer(m)&&m.getTooltip&&m.getTooltip())updateConnectorLine(m);});}
    map.on('moveend zoomend resize',updateAllConnectors);

    // ========== 드래그 라벨 ==========
    var tooltipOffsets={};
    function makeDraggableTooltip(layer){
        if(!layer.getTooltip||!layer.getTooltip())return;
        var tt=layer.getTooltip(),el=tt.getElement();if(!el||el._dragReady)return;
        el._dragReady=true;el.classList.add('draggable-tooltip');
        var mid=getMid(layer._props||{});
        el.addEventListener('mousedown',function(e){
            if(e.button!==0)return;e.stopPropagation();e.preventDefault();
            var sx=e.clientX,sy=e.clientY,cur=tooltipOffsets[mid]||{x:tt.options.offset[0],y:tt.options.offset[1]};
            map.dragging.disable();el.style.cursor='grabbing';
            function onMove(ev){var nx=cur.x+(ev.clientX-sx),ny=cur.y+(ev.clientY-sy);tt.options.offset=[nx,ny];tooltipOffsets[mid]={x:nx,y:ny};if(layer.getLatLng)tt.setLatLng(layer.getLatLng());updateConnectorLine(layer);}
            function onUp(){map.dragging.enable();el.style.cursor='grab';document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);}
            document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
        });
    }

    // ========== 라벨 빌드 (담당자 포함) ==========
    function buildBankLabel(p){
        var b=p['은행명']||'',n=p['점포명']||'',c=getBankColor(b);if(!n)return'';
        var mid=getMid(p), mgr=getManager(mid);
        var html='<div class="bank-tooltip-box" style="border-color:'+c+' !important;">'+
            '<div class="label-name">'+n+'</div>'+
            '<span class="label-bank" style="background:'+c+';">'+b+'</span>';
        if(mgr) html+='<div class="label-manager">👤 '+mgr+'</div>';
        html+='</div>';
        return html;
    }

    // ========== 라벨 갱신 (특정 마커) ==========
    function refreshLabel(layer){
        var p=layer._props||{}, mid=getMid(p);
        var off=tooltipOffsets[mid]?[tooltipOffsets[mid].x,tooltipOffsets[mid].y]:[0,-12];
        if(layer.getTooltip) layer.unbindTooltip();
        if(connectorLines[mid]){map.removeLayer(connectorLines[mid]);delete connectorLines[mid];}
        var lbl=buildBankLabel(p);
        if(lbl){
            layer.bindTooltip(lbl,{permanent:true,direction:'top',className:'bank-label',offset:off,interactive:true});
            layer.on('tooltipopen',function(){setTimeout(function(){makeDraggableTooltip(layer);},50);});
        }
        setTimeout(function(){updateConnectorLine(layer);},100);
    }

    // ========== 필터 ==========
    var allBanks=Object.keys(BANK_COLORS),bankVisible={},addrKeyword='',labelsVisible=true;
    // 담당자 필터: 'all' | 'yes' | 'no'
    var mgrFilter='all';
    allBanks.forEach(function(b){bankVisible[b]=true;});

    // 담당자 필터 버튼 이벤트
    (function(){
        var btnAll=document.getElementById('mgr-filter-all');
        var btnYes=document.getElementById('mgr-filter-yes');
        var btnNo=document.getElementById('mgr-filter-no');
        function setMgrFilter(val){
            mgrFilter=val;
            [btnAll,btnYes,btnNo].forEach(function(b){b.classList.remove('active');b.style.background='white';});
            if(val==='all'){btnAll.classList.add('active');btnAll.style.background='#2b6cb0';btnAll.style.color='white';}
            else if(val==='yes'){btnYes.classList.add('active');btnYes.style.background='#38a169';btnYes.style.color='white';}
            else{btnNo.classList.add('active');btnNo.style.background='#e53e3e';btnNo.style.color='white';}
            applyFilters();
        }
        btnAll.onclick=function(){setMgrFilter('all');};
        btnYes.onclick=function(){setMgrFilter('yes');};
        btnNo.onclick=function(){setMgrFilter('no');};
    })();

    var filterDiv=document.getElementById('bank-filters');
    allBanks.forEach(function(bank){
        var chip=document.createElement('span');chip.className='bank-chip active';
        chip.textContent=bank.replace('(구 대구은행)','');
        chip.style.background=getBankColor(bank);chip.style.borderColor=getBankColor(bank);chip.dataset.bank=bank;
        chip.onclick=function(){
            bankVisible[bank]=!bankVisible[bank];
            if(bankVisible[bank]){chip.classList.add('active');chip.style.background=getBankColor(bank);chip.style.color='white';}
            else{chip.classList.remove('active');chip.style.background='white';chip.style.color=getBankColor(bank);}
            applyFilters();
        };
        filterDiv.appendChild(chip);
    });
    document.getElementById('addr-filter').addEventListener('input',function(){addrKeyword=this.value.trim().toLowerCase();applyFilters();});

    // ========== 마커 생성 ==========
    var allMarkers=[], markerByMid={};
    function createMarkers(geojson){
        L.geoJson(geojson,{
            pointToLayer:function(f,ll){
                var b=f.properties['은행명']||'',c=getBankColor(b);
                var m=L.circleMarker(ll,{radius:6,fillColor:c,color:'#fff',weight:1.5,fillOpacity:0.85});
                m._bankName=b;m._props=f.properties;allMarkers.push(m);
                markerByMid[getMid(f.properties)]=m;
                return m;
            },
            onEachFeature:function(f,layer){
                var p=f.properties,c=getBankColor(p['은행명']||''),mid=getMid(p);

                // 팝업: 마커 클릭 시 담당자 편집 가능
                layer.on('click',function(){
                    var curMgr=getManager(mid);
                    var popupHtml='<div class="popup-inner"><div class="bank-tag" style="background:'+c+';">'+(p['은행명']||'')+'</div>'+
                        '<div class="name">'+(p['점포명']||'')+'</div>'+
                        '<div class="info-row"><b>지번</b> '+(p['지번주소']||'-')+'</div>'+
                        '<div class="info-row"><b>도로명</b> '+(p['도로명']||'-')+'</div>'+
                        '<div class="info-row"><b>전화</b> '+(p['전화번호']||'-')+'</div>'+
                        '<div class="manager-edit">'+
                            '<b>담당자</b>'+
                            '<input type="text" class="mgr-input" value="'+escHtml(curMgr)+'" placeholder="담당자명 입력">'+
                            '<button class="save-btn">저장</button>'+
                        '</div></div>';
                    layer.unbindPopup();
                    layer.bindPopup(popupHtml,{maxWidth:300}).openPopup();
                    setTimeout(function(){
                        var inp=document.querySelector('.mgr-input');
                        var btn=document.querySelector('.manager-edit .save-btn');
                        if(!inp||!btn) return;
                        function doSave(){
                            var val=inp.value.trim();
                            setManager(mid, val);
                            refreshLabel(layer);
                            updateList();
                            btn.textContent='✓'; btn.style.background='#38a169';
                            setTimeout(function(){btn.textContent='저장';btn.style.background='';},800);
                        }
                        btn.onclick=doSave;
                        inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doSave();}});
                    },80);
                });

                var lbl=buildBankLabel(p);
                if(lbl){
                    var off=tooltipOffsets[mid]?[tooltipOffsets[mid].x,tooltipOffsets[mid].y]:[0,-12];
                    layer.bindTooltip(lbl,{permanent:true,direction:'top',className:'bank-label',offset:off,interactive:true});
                    layer.on('tooltipopen',function(){setTimeout(function(){makeDraggableTooltip(layer);},50);});
                }
            }
        }).addTo(map);
    }
    function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    createMarkers(json_bank_1st);createMarkers(json_bank_2nd);

    // ========== 필터 적용 (담당자명 검색 + 담당자 유무 필터) ==========
    function applyFilters(){
        var cnt=0;
        allMarkers.forEach(function(m){
            var b=m._bankName,a=(m._props['지번주소']||'').toLowerCase(),r=(m._props['도로명']||'').toLowerCase(),n=(m._props['점포명']||'').toLowerCase();
            var mid=getMid(m._props||{}), mgr=getManager(mid);
            var mgrLow=mgr.toLowerCase();
            // 은행 필터 + 텍스트 검색
            var ok=bankVisible[b]!==false&&(!addrKeyword||a.indexOf(addrKeyword)!==-1||r.indexOf(addrKeyword)!==-1||n.indexOf(addrKeyword)!==-1||mgrLow.indexOf(addrKeyword)!==-1);
            // 담당자 유무 필터
            if(ok && mgrFilter==='yes') ok=!!mgr;
            if(ok && mgrFilter==='no') ok=!mgr;
            if(ok){if(!map.hasLayer(m))map.addLayer(m);cnt++;}
            else{if(map.hasLayer(m))map.removeLayer(m);if(connectorLines[mid]){map.removeLayer(connectorLines[mid]);delete connectorLines[mid];}}
        });
        document.getElementById('visible-count').textContent=cnt.toLocaleString();
        updateList();setTimeout(updateAllConnectors,200);
    }

    // ========== 사이드 목록 (담당자 표시) ==========
    function updateList(){
        var c=document.getElementById('list-container'),bounds=map.getBounds(),items=[];
        allMarkers.forEach(function(m){if(map.hasLayer(m)&&bounds.contains(m.getLatLng()))items.push(m);});
        items.sort(function(a,b){return(a._props['지번주소']||'').localeCompare(b._props['지번주소']||'','ko');});
        if(!items.length){c.innerHTML='<div class="empty-state">화면 내 표시할 지점이 없습니다</div>';return;}
        var html='',max=Math.min(items.length,200);
        for(var i=0;i<max;i++){
            var m=items[i],p=m._props,col=getBankColor(p['은행명']||'');
            var mid=getMid(p),mgr=getManager(mid);
            html+='<div class="list-item" onclick="focusMarker('+m._leaflet_id+')">'+
                '<span class="bank-badge" style="background:'+col+';">'+(p['은행명']||'')+'</span>'+
                '<div class="name">'+(p['점포명']||'')+'</div>'+
                '<div class="addr">'+(p['지번주소']||p['도로명']||'')+'</div>'+
                (mgr?'<div class="manager">👤 '+mgr+'</div>':'')+
                (p['전화번호']?'<div class="phone">📞 '+p['전화번호']+'</div>':'')+'</div>';
        }
        if(items.length>200)html+='<div class="empty-state">외 '+(items.length-200)+'건 (줌인하면 더 표시)</div>';
        c.innerHTML=html;
    }
    window.focusMarker=function(id){
        map.eachLayer(function(l){if(l._leaflet_id===id){map.setView(l.getLatLng(),16);l.fire('click');}});
        var panel=document.getElementById('side-panel');
        if(window.innerWidth<=768) panel.classList.remove('open');
    };
    map.on('moveend zoomend',updateList);

    // ========== 라벨 토글 + 초기화 컨트롤 ==========
    (function(){
        var C=L.Control.extend({options:{position:'topright'},onAdd:function(){
            var d=L.DomUtil.create('div','label-toggle-ctrl');
            d.innerHTML='<button id="btn-lbl-toggle" title="라벨 표시/숨김">🏷️ 라벨</button><button id="btn-lbl-reset" title="위치 초기화" style="color:#e53e3e;">↺ 초기화</button>';
            L.DomEvent.disableClickPropagation(d);
            d.querySelector('#btn-lbl-toggle').onclick=function(){
                labelsVisible=!labelsVisible;
                if(labelsVisible){map.getContainer().classList.remove('labels-hidden');this.style.opacity='1';}
                else{map.getContainer().classList.add('labels-hidden');this.style.opacity='0.5';}
            };
            d.querySelector('#btn-lbl-reset').onclick=function(){
                tooltipOffsets={};Object.keys(connectorLines).forEach(function(k){map.removeLayer(connectorLines[k]);});connectorLines={};
                allMarkers.forEach(function(m){if(m.getTooltip){m.unbindTooltip();var p=m._props||{},lbl=buildBankLabel(p);
                    if(lbl){m.bindTooltip(lbl,{permanent:true,direction:'top',className:'bank-label',offset:[0,-12],interactive:true});
                    m.on('tooltipopen',function(){setTimeout(function(){makeDraggableTooltip(m);},50);});}}});
            };
            return d;
        }});
        map.addControl(new C());
    })();

    applyFilters();setTimeout(updateAllConnectors,500);
    </script>
</body>
</html>
